<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>텍스트 카운터</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📇</text></svg>">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            width: 100%;
            max-width: 500px;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
            font-weight: 600;
        }

        .subtitle {
            text-align: center;
            color: #999;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .input-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            color: #555;
            font-weight: 500;
            margin-bottom: 10px;
            font-size: 14px;
        }

        textarea {
            width: 100%;
            height: 200px;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 14px;
            resize: vertical;
            transition: all 0.3s ease;
        }

        textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .checkbox-group {
            margin-top: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #667eea;
        }

        .checkbox-label {
            margin: 0;
            font-size: 13px;
            color: #666;
            cursor: pointer;
            user-select: none;
        }

        .result-container {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            margin-bottom: 25px;
            color: white;
        }

        .result-label {
            font-size: 14px;
            opacity: 0.9;
            margin-bottom: 10px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .result-count {
            font-size: 48px;
            font-weight: 700;
            animation: countUp 0.4s ease-out;
        }

        @keyframes countUp {
            from {
                transform: scale(0.8);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .stats-main {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }

        .stat-main-box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.2);
        }

        .stat-main-box .stat-label {
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 12px;
            font-size: 13px;
        }

        .stat-main-box .stat-value {
            color: white;
            font-size: 32px;
            font-weight: 700;
        }

        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }

        .stat-box {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }

        .stat-label {
            color: #999;
            font-size: 12px;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-value {
            color: #333;
            font-size: 24px;
            font-weight: 600;
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        .info-text {
            text-align: center;
            color: #999;
            font-size: 12px;
            margin-top: 15px;
            line-height: 1.6;
        }

        .comma-icon {
            display: inline-block;
            font-size: 20px;
            margin-right: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>쉼표·온점 카운터였던거</h1>
        <p class="subtitle">텍스트에 포함된 쉼표와 온점의 개수(+이것저것)를 세어드립니다</p>

        <div class="input-group">
            <label for="textInput">텍스트를 입력하세요:</label>
            <textarea id="textInput" placeholder="여기에 텍스트를 입력해주세요..."></textarea>
            <div class="checkbox-group">
                <input type="checkbox" id="removeHtml" name="removeHtml">
                <label for="removeHtml" class="checkbox-label">HTML 태그 제거</label>
            </div>
        </div>

        <div class="stats">
            <div class="stat-box">
                <div class="stat-label">전체 문자</div>
                <div class="stat-value" id="charCount">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">단어 개수</div>
                <div class="stat-value" id="wordCount">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">문단 개수</div>
                <div class="stat-value" id="paragraphCount">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">문장 개수</div>
                <div class="stat-value" id="sentenceCount">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">문단당 문장</div>
                <div class="stat-value" id="avgSentences">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">문장당 단어</div>
                <div class="stat-value" id="avgWords">0</div>
            </div>
        </div>

        <div class="stats">
            <div class="stat-box">
                <div class="stat-label">쉼표 갯수</div>
                <div class="stat-value" id="commaCount">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">온점 갯수</div>
                <div class="stat-value" id="periodCount">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">추정 토큰</div>
                <div class="stat-value" id="tokenCount">0</div>
            </div>
        </div>

        <button onclick="clearText()">초기화</button>
    </div>

    <script>
        const textInput = document.getElementById('textInput');
        const removeHtml = document.getElementById('removeHtml');
        const commaCount = document.getElementById('commaCount');
        const periodCount = document.getElementById('periodCount');
        const charCount = document.getElementById('charCount');
        const wordCount = document.getElementById('wordCount');
        const paragraphCount = document.getElementById('paragraphCount');
        const sentenceCount = document.getElementById('sentenceCount');
        const avgSentences = document.getElementById('avgSentences');
        const avgWords = document.getElementById('avgWords');
        const tokenCount = document.getElementById('tokenCount');

        function updateCount() {
            let text = textInput.value;
            
            // HTML 제거 옵션 활성화 시
            if (removeHtml.checked) {
                text = text.replace(/<[^>]*>[\s\S]*?<\/[^>]*>|<[^>]*\/>/g, '');
            }
            
            // 쉼표 개수 세기
            const commas = (text.match(/,/g) || []).length;
            commaCount.textContent = commas;
            
            // 온점 개수 세기
            const periods = (text.match(/\./g) || []).length;
            periodCount.textContent = periods;
            
            // 전체 문자 수 (공백 포함)
            const totalChars = text.length;
            charCount.textContent = totalChars;
            
            // 단어 개수
            const words = text.trim().length > 0 
                ? text.trim().split(/\s+/).length 
                : 0;
            wordCount.textContent = words;
            
            // 문단 개수 (2줄 이상 띄어진 곳으로 구분)
            const paragraphs = text.trim().length > 0
                ? text.trim().split(/\n\s*\n+/).filter(p => p.trim().length > 0).length
                : 0;
            paragraphCount.textContent = paragraphs;
            
            // 문장 개수 (온점 기준)
            const sentences = periods;
            sentenceCount.textContent = sentences;
            
            // 문단당 평균 문장 수
            const avgSent = paragraphs > 0 ? (sentences / paragraphs).toFixed(1) : 0;
            avgSentences.textContent = avgSent;
            
            // 문장당 평균 단어 수
            const avgWord = sentences > 0 ? (words / sentences).toFixed(1) : 0;
            avgWords.textContent = avgWord;
            
            // 추정 토큰 수 (전체 글 수 × 1.2)
            const tokens = Math.ceil(totalChars * 1.2);
            tokenCount.textContent = tokens;
        }

        function clearText() {
            textInput.value = '';
            updateCount();
            textInput.focus();
        }

        // 입력 이벤트 리스너
        textInput.addEventListener('input', updateCount);
        
        // 체크박스 변경 이벤트 리스너
        removeHtml.addEventListener('change', updateCount);

        // 초기 포커스
        textInput.focus();
    </script>
</body>
</html>
