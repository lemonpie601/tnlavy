<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>쉼표 카운터</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            width: 100%;
            max-width: 500px;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
            font-weight: 600;
        }

        .subtitle {
            text-align: center;
            color: #999;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .input-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            color: #555;
            font-weight: 500;
            margin-bottom: 10px;
            font-size: 14px;
        }

        textarea {
            width: 100%;
            height: 200px;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 14px;
            resize: vertical;
            transition: all 0.3s ease;
        }

        textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .result-container {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            margin-bottom: 25px;
            color: white;
        }

        .result-label {
            font-size: 14px;
            opacity: 0.9;
            margin-bottom: 10px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .result-count {
            font-size: 48px;
            font-weight: 700;
            animation: countUp 0.4s ease-out;
        }

        @keyframes countUp {
            from {
                transform: scale(0.8);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .stats-main {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }

        .stat-main-box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.2);
        }

        .stat-main-box .stat-label {
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 12px;
            font-size: 13px;
        }

        .stat-main-box .stat-value {
            color: white;
            font-size: 32px;
            font-weight: 700;
        }

        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }

        .stat-box {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }

        .stat-label {
            color: #999;
            font-size: 12px;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-value {
            color: #333;
            font-size: 24px;
            font-weight: 600;
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        .info-text {
            text-align: center;
            color: #999;
            font-size: 12px;
            margin-top: 15px;
            line-height: 1.6;
        }

        .comma-icon {
            display: inline-block;
            font-size: 20px;
            margin-right: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1><span class="comma-icon">,</span>쉼표·온점 카운터</h1>
        <p class="subtitle">텍스트에 포함된 쉼표와 온점의 개수를 세어드립니다</p>

        <div class="input-group">
            <label for="textInput">텍스트를 입력하세요:</label>
            <textarea id="textInput" placeholder="여기에 텍스트를 입력해주세요..."></textarea>
        </div>

        <div class="stats-main">
            <div class="stat-main-box">
                <div class="stat-label">쉼표</div>
                <div class="stat-value" id="commaCount">0</div>
            </div>
            <div class="stat-main-box">
                <div class="stat-label">온점</div>
                <div class="stat-value" id="periodCount">0</div>
            </div>
        </div>

        <div class="stats">
            <div class="stat-box">
                <div class="stat-label">전체 문자</div>
                <div class="stat-value" id="charCount">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">단어 개수</div>
                <div class="stat-value" id="wordCount">0</div>
            </div>
        </div>

        <button onclick="clearText()">초기화</button>

        <p class="info-text">
            💡 실시간으로 쉼표와 온점 개수가 계산됩니다<br>
            텍스트를 입력하거나 수정할 때마다 자동으로 업데이트됩니다
        </p>
    </div>

    <script>
        const textInput = document.getElementById('textInput');
        const commaCount = document.getElementById('commaCount');
        const periodCount = document.getElementById('periodCount');
        const charCount = document.getElementById('charCount');
        const wordCount = document.getElementById('wordCount');

        function updateCount() {
            const text = textInput.value;
            
            // 쉼표 개수 세기
            const commas = (text.match(/,/g) || []).length;
            commaCount.textContent = commas;
            
            // 온점 개수 세기
            const periods = (text.match(/\./g) || []).length;
            periodCount.textContent = periods;
            
            // 전체 문자 수 (공백 포함)
            charCount.textContent = text.length;
            
            // 단어 개수
            const words = text.trim().length > 0 
                ? text.trim().split(/\s+/).length 
                : 0;
            wordCount.textContent = words;
        }

        function clearText() {
            textInput.value = '';
            updateCount();
            textInput.focus();
        }

        // 입력 이벤트 리스너
        textInput.addEventListener('input', updateCount);

        // 초기 포커스
        textInput.focus();
    </script>
</body>
</html>
